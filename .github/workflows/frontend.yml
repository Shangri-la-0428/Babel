name: Frontend Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["frontend/**", "design/**", ".github/workflows/frontend.yml"]
  pull_request:
    branches: [main]
    paths: ["frontend/**", "design/**", ".github/workflows/frontend.yml"]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npm run build

      - name: Lint (zero warnings)
        run: npm run lint -- --max-warnings 6

      - name: Unit tests
        run: npm run test:unit
