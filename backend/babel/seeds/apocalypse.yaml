name: "末日方舟"
description: "2012年，全球板块剧烈运动引发超级地震与巨型海啸，文明在72小时内崩塌。幸存者聚集在一艘搁浅的远洋邮轮上，海水仍在上涨，余震不断。物资在减少，信任在瓦解，下一波灾难随时可能到来。"

time:
  unit: "hour"
  ticks_per_unit: 2
  start: "06:00"
  day_cycle: true
  day_length: 24
  periods:
    - { name: "night", start: 21, end: 5 }
    - { name: "dawn", start: 5, end: 7 }
    - { name: "morning", start: 7, end: 12 }
    - { name: "afternoon", start: 12, end: 17 }
    - { name: "dusk", start: 17, end: 21 }

rules:
  - "淡水和食物是最稀缺的资源，所有分配必须经过方舟委员会同意"
  - "任何人不得私藏超过三天份额的物资，违者流放"
  - "气象观测数据只有持有无线电设备的人才能获取"
  - "夜间禁止单独外出，洪水区域随时可能坍塌"
  - "方舟上的每一个人都必须贡献劳动力，否则不予配给"

locations:
  - name: "方舟甲板"
    description: "搁浅在山脊上的远洋邮轮顶层，倾斜15度，生锈的栏杆上系满了求救旗帜，临时帐篷在风中猎猎作响"
    connections: ["补给仓库", "沉没都市"]
  - name: "沉没都市"
    description: "半淹的城市废墟，高楼只露出上半截，浑浊的水面漂浮着碎片，偶尔能找到有用的物资"
    connections: ["方舟甲板", "鹰巢营地"]
  - name: "鹰巢营地"
    description: "海拔800米的山腰平台，用残骸搭建的营地，拥有唯一还能工作的气象观测站"
    connections: ["沉没都市", "方舟甲板"]
  - name: "补给仓库"
    description: "邮轮底层的货舱，积水没过脚踝，货架上残存着罐头、药品和机械零件，只有一个人知道完整的库存清单"
    connections: ["方舟甲板"]

resources:
  - name: "配给券"
    description: "方舟委员会发放的物资兑换凭证，每人每日一张"
  - name: "零件"
    description: "电子元件、金属部件，用于维修设备和无线电"

agents:
  - id: "captain_zhou"
    name: "老周"
    description: "前远洋货轮船长，58岁，灾难发生时正在港口。凭经验和威望被推举为方舟委员会领导人，但内心知道这艘搁浅的船撑不了多久。"
    personality: "沉稳、威严、责任感极强、不善表达感情、习惯独自承受压力"
    goals:
      - "维持方舟上200名幸存者的基本秩序与配给制度"
      - "获取林博士的气象预测数据来决定是否需要转移全体幸存者"
      - "查明补给仓库的物资为何消耗速度远超预期"
    inventory:
      - "船长制服"
      - "航海望远镜"
      - "方舟委员会印章"
      - "5张配给券"
    location: "方舟甲板"

  - id: "dr_lin"
    name: "林博士"
    description: "地震学家，42岁，灾前在国家地震局工作。她通过残存的地震仪数据发现了一个可怕的规律——更大的灾难将在七天内到来，但她的无线电发射器坏了，无法接收卫星数据来确认。"
    personality: "理性、焦虑、执着于数据和证据、不擅长说服他人、内心矛盾"
    goals:
      - "修好无线电设备以接收卫星地震监测数据，确认她的七日预测"
      - "说服老周在确认数据后立刻组织向高海拔地区转移"
      - "隐藏她已确诊辐射病的事实，在有限时间内完成使命"
    inventory:
      - "损坏的无线电接收器"
      - "手写地震数据笔记本"
      - "碘化钾药片（仅剩3粒）"
      - "2张配给券"
    location: "鹰巢营地"

  - id: "scavenger_mao"
    name: "猫爷"
    description: "灾前是电器城的维修师傅，35岁，灾后靠潜入沉没都市搜刮物资起家。名义上是方舟的物资搜索队长，实际上私藏了大量零件和食品，用黑市交易巩固自己的权力。"
    personality: "圆滑、精明、表面热心实则自私、生存本能极强、对弱者偶有恻隐"
    goals:
      - "维持对补给仓库的实际控制权，不让老周发现私藏物资的规模"
      - "用手中的无线电零件跟林博士交换情报——如果灾难真的要来，他要第一个知道"
      - "秘密修复一艘小型快艇，作为自己的逃生后路"
    inventory:
      - "补给仓库钥匙"
      - "无线电零件（若干）"
      - "潜水装备"
      - "15张配给券"
      - "藏匿的物资清单"
    location: "补给仓库"

initial_events:
  - "黎明时分，方舟剧烈摇晃——又一次余震，船体传来不祥的金属断裂声"
  - "林博士在鹰巢营地通宵分析数据后面色苍白地走出帐篷，手中紧攥着笔记本"
  - "猫爷从沉没都市的一次潜水搜索中带回了一箱物资，但只上报了一半"
  - "方舟甲板上有人开始公开质疑配给制度的公平性，人群情绪躁动"
